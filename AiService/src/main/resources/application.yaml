server:
  port: 8080
  tomcat:
    connection-timeout: 600s
  servlet:
    session:
      timeout: 200s

spring:
  application:
    name: AiService
  webflux:
    base-path: /

  datasource:
    url: jdbc:postgresql://${PG_ENDPOINT:localhost:5433}/${PG_DATABASE:postgres}
    username: ${PG_USERNAME:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${AI_ENDPOINT:https://openrouter.ai/api}
      chat:
        options:
          model: nvidia/nemotron-3-nano-30b-a3b:free
          temperature: 0.0

  security:
    oauth2:
      client:
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_PROVIDER_URI}
        client-registration-name: ai-service-client
        registration:
          ai-service-client:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: ${spring.application.name}
            client-secret: ${AI_CLIENT_SECRET}
            client-authentication-method: client_secret_basic
            scope: openid

app:
  maxMessages: 10
  systemPrompt: ${SYSTEM_PROMPT}

logging:
  level:
    org.springframework: INFO
    com.wenn.aiservice: DEBUG