server:
  port: 8084
  tomcat:
    connection-timeout: 30s

spring:
  application:
    name: ExecutionService

  datasource:
    url: ${PG_URL}
    username: ${PG_USERNAME}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jooq:
    sql-dialect: postgres

  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

    consumer:
      group-id: ${spring.application.name}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.javalab.core.events

    topic-names:
      test-case-events: ${TEST_CASE_EVENTS_TOPIC}
      execution-attempt-topic: ${EXECUTION_ATTEMPT_TOPIC}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI}

code-execution:
  async:
    pool-size: 50
    core-pool-size: 10
    queue-capacity: 200
    thread-name-prefix: execution-
  timeout:
    compilation: 30s
    execution: 30s
  validation:
    enabled: true
    allowed-packages:
      - java.lang
      - java.util
      - java.math
      - java.time
      - java.util.stream
      - java.util.function
      - java.text
    forbidden-packages:
      - java.net
      - java.nio.file
      - java.lang.Runtime
      - java.lang.System
      - javax.script
      - sun.misc
      - java.security
    forbidden-methods:
      - java.lang.System.exit
      - java.lang.Thread.halt
      - java.lang.Thread.suspend
      - java.lang.Thread.resume
      - java.lang.Runtime.exec
  compiler:
    parameters:
      - "-proc:none"
      - "-encoding"
      - "UTF-8"
      - "--release"
      - "23"
      - "-Xlint:-options"
      - "-Xmaxerrs"
      - "10"
    default-user-class-name: Main
    default-main-method-name: solve
  docker:
    network: "none"
    memory: "256m"
    connection-timeout: 1m
    response-timeout: 1m
    max-connections: 100
    tls-verify: false
    docker-host: ${DOCKER_HOST}