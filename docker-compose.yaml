services:
  kafka:
    image: apache/kafka:latest
    hostname: broker
    container_name: kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

  postgres:
    container_name: postgres
    image: postgres:17-alpine
    restart: "no"
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-db-init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: postgres

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL: ${INTERNAL_POSTGRES_URL}
      KC_DB_USERNAME: ${PG_USER:-postgres}
      KC_DB_PASSWORD: ${PG_PASSWORD:-postgres}

      KC_HOSTNAME: ${KEYCLOAK_HOST}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      KAFKA_LOGIN_TOPIC: ${KAFKA_LOGIN_TOPIC}
    ports:
      - "${KEYCLOAK_PORT:-9090}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./KeycloakLoginEventListener/target:/opt/keycloak/providers
    depends_on:
      - postgres
      - kafka

  traefik:
    image: traefik:v3.0
    container_name: traefik-gateway
    ports:
      - "${TRAEFIK_HTTP_PORT:-70}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8070}:8080"
    volumes:
      - ./traefik:/etc/traefik
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
    environment:
      ALLOW_ORIGIN_1: ${TRAEFIK_ALLOW_ORIGIN_1}
    networks:
      - traefik-net

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "${MINIO_SERVICE_PORT:-9000}:9000"
      - "${MINIO_WEB_PORT:-9001}:9001"
    command:
      - server
      - /data
      - --console-address
      - ":${MINIO_WEB_PORT:-9001}"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  keycloak_data:
  minio_data:

networks:
  traefik-net:
    driver: bridge