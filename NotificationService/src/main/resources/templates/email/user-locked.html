<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус аккаунта</title>

    <style>
        body, table, td { margin: 0; padding: 0; }
        table { border-collapse: collapse !important; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
            background-color: #f1f5f9;
        }

        .email-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }

        .email-header {
            background: linear-gradient(135deg, #8ad0ecd6 0%, #9997c3 100%);
            padding: 24px;
            text-align: center;
        }

        .email-logo-text {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
        }

        .email-body {
            padding: 32px;
        }

        .status-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin: 24px 0;
            border: 1px solid #e2e8f0;
        }

        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .meta {
            font-size: 14px;
            color: #475569;
            margin-bottom: 8px;
        }

        .email-footer {
            background-color: #f8fafc;
            padding: 20px;
            text-align: center;
        }

        .email-footer p {
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
<table style="width:100%;">
    <tr>
        <td align="center">

            <div class="email-container">

                <!-- HEADER -->
                <div class="email-header">
                    <span class="email-logo-text">JavaLab</span>
                    <h1 th:text="${isLock} ? 'Аккаунт заблокирован' : 'Аккаунт разблокирован'"></h1>
                </div>

                <!-- BODY -->
                <div class="email-body">

                    <p>
                        Здравствуйте, <b th:text="${username}">User</b>!
                    </p>

                    <!-- LOCK -->
                    <div th:if="${isLock}" class="status-box">

                        <div class="status-title">
                            Ваш аккаунт был заблокирован
                        </div>

                        <div class="meta" th:if="${startLock != null}">
                            Начало: <span th:text="${startLock}"></span>
                        </div>

                        <div class="meta" th:if="${endLock != null}">
                            Окончание: <span th:text="${endLock}"></span>
                        </div>

                        <div class="meta" th:if="${message != null}">
                            Причина: <span th:text="${message}"></span>
                        </div>

                    </div>

                    <!-- UNLOCK -->
                    <div th:if="${!isLock}" class="status-box">

                        <div class="status-title">
                            Ваш аккаунт был разблокирован
                        </div>

                        <div class="meta" th:if="${endLock != null}">
                            Время разблокировки: <span th:text="${endLock}"></span>
                        </div>

                    </div>

                    <p>
                        Если у вас есть вопросы, обратитесь в поддержку.
                    </p>

                </div>

                <!-- FOOTER -->
                <div class="email-footer">
                    <p>Это письмо отправлено автоматически. Пожалуйста, не отвечайте на него.</p>
                    <p>&copy; <span th:text="${year}">2026</span> JavaLab. Все права защищены.</p>
                </div>

            </div>

        </td>
    </tr>
</table>
</body>
</html>
