http:
  middlewares:
    cors-middleware:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
          - Authorization
        accessControlAllowOriginList:
          - '{{ env "ALLOW_ORIGIN_1" }}'
        accessControlMaxAge: 100
        addVaryHeader: true
        accessControlAllowCredentials: true

    websocket-middleware:
      headers:
        accessControlAllowOriginList:
          - '{{ env "ALLOW_ORIGIN_1" }}'
        accessControlAllowCredentials: true
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "Connection"
          - "Upgrade"
          - "Sec-WebSocket-Key"
          - "Sec-WebSocket-Version"
          - "Sec-WebSocket-Extensions"
        accessControlExposeHeaders:
          - "Upgrade"
          - "Connection"
        addVaryHeader: true
        customFrameOptionsValue: "DENY"

  routers:
    user-router:
      rule: "PathPrefix(`/api/v1/user`)"
      service: user-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

    auth-router:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: user-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

    ai-router:
      rule: "PathPrefix(`/api/v1/ai`)"
      service: ai-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

    progress-router:
      rule: "PathPrefix(`/api/v1/progress`)"
      service: progress-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

    notification-router:
      rule: "PathPrefix(`/api/v1/notification`)"
      service: notification-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

    execution-router:
      rule: "PathPrefix(`/api/v1/execution`)"
      service: execution-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

    execution-ws-router:
      rule: "PathPrefix(`/api/v1/execution/ws`)"
      service: execution-service
      entryPoints:
        - web
      middlewares:
        - websocket-middleware

    task-router:
      rule: "PathPrefix(`/api/v1/task`)"
      service: task-service
      entryPoints:
        - web
      middlewares:
        - cors-middleware

  services:
    user-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"
    ai-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8081"
    progress-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8082"
    notification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8083"
    execution-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8084"
    task-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8085"